version: 1.0.{build}
image: Visual Studio 2022
install:
  - dotnet tool install --global GitVersion.Tool
before_build:
  - cmd: dotnet --version
  - ps: dotnet-gitversion /l console /output buildserver
  - cmd: dotnet restore ./src/TwentyTwenty.BaseLine/TwentyTwenty.BaseLine.csproj
build_script:
  - cmd: dotnet pack ./src/TwentyTwenty.BaseLine/TwentyTwenty.BaseLine.csproj --no-restore -c Release -p:PackageVersion=%GitVersion_NuGetVersion%
test: off
artifacts:
  - path: '**\*.nupkg'
deploy:
  - provider: NuGet
    api_key:
      secure: XDYUP5FUbfBpSCa5alD/lpMWAj12aomtjy3qwfyr2My5fZnS7NGmg7j7eUA8jZsh
    artifact: /.*\.nupkg/
    on:
      appveyor_repo_tag: true

  - provider: GitHub
    release: "%GitVersion_NuGetVersion%"
    description: 'TwentyTwenty.BaseLine'
    auth_token:
      secure: jRySGaPcL/02436nnSFXkf/7wkuamJan+trlbInaAs3NNXCv3S+7IvEiMGvHURPgBBxkMRkB33G0uIeRZ5gQCgSn+Eh2zXORQqSGnWQ0qscw9u5b7OPw3Nyl9/yG2wpq
    artifact: /.*\.nupkg/
    draft: false
    on:    
      appveyor_repo_tag: true        # deploy on tag push only